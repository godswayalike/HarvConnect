<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | HarvConnect</title>
    <link rel="stylesheet" href="../styles/buyer-shared.css" />
    <link rel="stylesheet" href="../styles/buyer-dashboard.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div class="dashboard-shell">
      <!-- Sidebar Navigation -->
      <aside class="sidebar" role="navigation" aria-label="Buyer navigation">
        <div class="brand-block">
          <img
            src="../images/HarvConnect-logo.png"
            alt="HarvConnect Logo"
            class="brand-logo"
          />
        </div>

        <nav class="sidebar-nav">
          <a href="buyer-dashboard.html" class="nav-link active" data-page="dashboard">
            <i class="ph ph-squares-four"></i>
            <span>Marketplace</span>
          </a>
          <a href="buyer-search.html" class="nav-link" data-page="search">
            <i class="ph ph-magnifying-glass"></i>
            <span>Search</span>
          </a>
          <a href="buyer-orders.html" class="nav-link" data-page="orders">
            <i class="ph ph-shopping-cart"></i>
            <span>My Orders</span>
            <span class="cart-badge" style="display: none;">0</span>
          </a>
          <a href="buyer-chat.html" class="nav-link" data-page="chat">
            <i class="ph ph-chat-circle-dots"></i>
            <span>Messages</span>
          </a>
          <a href="buyer-profile.html" class="nav-link" data-page="profile">
            <i class="ph ph-user"></i>
            <span>Profile</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <button type="button" id="logoutBtn" class="logout-link">
            <i class="ph ph-sign-out"></i>
            <span>Logout</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
          <div class="search-container">
            <div class="search-bar">
              <i class="ph ph-magnifying-glass"></i>
              <input 
                type="text" 
                id="searchInput" 
                placeholder="Search for fresh produce..." 
                aria-label="Search products"
              />
            </div>
          </div>
          
          <div class="profile-pill">
            <div class="notification-bell" id="notificationBell" role="button" aria-label="Notifications">
              <i class="ph ph-bell"></i>
            </div>
            <div class="avatar" id="userInitials">B</div>
          </div>
        </header>

        <!-- Content Area -->
        <section class="content-area">
          <!-- Welcome Card -->
          <div class="welcome-card">
            <div class="welcome-content">
              <p class="eyebrow">Buyer Dashboard</p>
              <h1 id="welcomeMessage">Welcome back!</h1>
              <p class="welcome-copy">
                Discover fresh produce from trusted local farmers. Support your community 
                and enjoy the freshest ingredients delivered to your doorstep.
              </p>
            </div>
          </div>

          <!-- Categories Section -->
          <div class="categories-section">
            <div class="section-header">
              <h2>Shop by Category</h2>
            </div>
            <div class="categories-scroll" id="categoriesContainer" role="tablist" aria-label="Product categories">
              <!-- Categories will be rendered here -->
            </div>
          </div>

          <!-- Featured Products Section -->
          <div class="products-section">
            <div class="section-header">
              <h2>Featured Produce</h2>
              <button class="section-action" id="viewAllBtn">View All</button>
            </div>
            <div class="products-grid" id="produceGrid" aria-live="polite" aria-busy="false">
              <!-- Products will be rendered here -->
            </div>
          </div>

          <!-- Nearby Products Section -->
          <div class="products-section" id="nearbySection" style="display: none;">
            <div class="section-header">
              <h2>Nearby Products</h2>
              <span class="section-action" id="locationStatus">
                <i class="ph ph-map-pin"></i>
                <span id="locationText">Detecting location...</span>
              </span>
            </div>
            <div class="products-grid" id="nearbyGrid" aria-live="polite">
              <!-- Nearby products will be rendered here -->
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Scripts -->
    <script src="../scripts/api.js"></script>
    <script src="../scripts/buyer-shared.js"></script>
    <script src="../scripts/buyer-dashboard.js"></script>
  </body>
</html>
