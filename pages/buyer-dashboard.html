<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buyer Dashboard | HarvConnect</title>
    <link rel="stylesheet" href="../css/buyer-dashboard.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div class="dashboard-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <img
            src="../images/HarvConnect-logo.png"
            alt="HarvConnect Logo"
            class="brand-logo"
          />
        </div>

        <nav class="sidebar-nav" aria-label="Buyer dashboard navigation">
          <a href="#" class="nav-link active">
            <i class="ph ph-squares-four"></i>
            <span>Marketplace</span>
          </a>
          <a href="#" class="nav-link">
            <i class="ph ph-shopping-cart"></i>
            <span>My Orders</span>
          </a>
          <a href="#" class="nav-link">
            <i class="ph ph-gear"></i>
            <span>Settings</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <button type="button" id="logoutBtn" class="logout-link">
            <i class="ph ph-sign-out"></i>
            <span>Logout</span>
          </button>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-bar">
          <div class="search-bar">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" placeholder="Search for fresh produce..." />
          </div>
          <div class="profile-pill">
            <i class="ph ph-bell"></i>
            <div class="avatar" id="userInitials">B</div>
          </div>
        </header>

        <section class="content-area">
          <div class="welcome-card">
            <div>
              <p class="eyebrow">Buyer dashboard</p>
              <h1 id="welcomeMessage">Welcome back!</h1>
              <p class="welcome-copy">
                Find fresh produce from trusted farmers and place your next
                order.
              </p>
            </div>
          </div>

          <div class="section-header">
            <h2>Featured produce</h2>
          </div>

          <div class="produce-grid" id="produceGrid" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="../scripts/api.js"></script>
    <script src="../scripts/buyer-dashboard.js"></script>
  </body>
</html>
