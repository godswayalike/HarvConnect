<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search | HarvConnect</title>
    <link rel="stylesheet" href="../styles/buyer-shared.css" />
    <link rel="stylesheet" href="../styles/buyer-dashboard.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div class="dashboard-shell">
      <!-- Sidebar Navigation -->
      <aside class="sidebar" role="navigation" aria-label="Buyer navigation">
        <div class="brand-block">
          <img
            src="../images/HarvConnect-logo.png"
            alt="HarvConnect Logo"
            class="brand-logo"
          />
        </div>

        <nav class="sidebar-nav">
          <a href="buyer-dashboard.html" class="nav-link" data-page="dashboard">
            <i class="ph ph-squares-four"></i>
            <span>Marketplace</span>
          </a>
          <a href="buyer-search.html" class="nav-link active" data-page="search">
            <i class="ph ph-magnifying-glass"></i>
            <span>Search</span>
          </a>
          <a href="buyer-orders.html" class="nav-link" data-page="orders">
            <i class="ph ph-shopping-cart"></i>
            <span>My Orders</span>
            <span class="cart-badge" style="display: none;">0</span>
          </a>
          <a href="buyer-chat.html" class="nav-link" data-page="chat">
            <i class="ph ph-chat-circle-dots"></i>
            <span>Messages</span>
          </a>
          <a href="buyer-profile.html" class="nav-link" data-page="profile">
            <i class="ph ph-user"></i>
            <span>Profile</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <button type="button" id="logoutBtn" class="logout-link">
            <i class="ph ph-sign-out"></i>
            <span>Logout</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
          <div class="search-container">
            <div class="search-bar">
              <i class="ph ph-magnifying-glass"></i>
              <input 
                type="text" 
                id="searchInput" 
                placeholder="Search for fresh produce..." 
                aria-label="Search products"
                autofocus
              />
            </div>
          </div>
          
          <div class="profile-pill">
            <div class="notification-bell" id="notificationBell" role="button" aria-label="Notifications">
              <i class="ph ph-bell"></i>
            </div>
            <div class="avatar" id="userInitials">B</div>
          </div>
        </header>

        <!-- Content Area -->
        <section class="content-area">
          <!-- Search Header -->
          <div class="welcome-card">
            <div class="welcome-content">
              <p class="eyebrow">Search</p>
              <h1 id="searchTitle">Find Fresh Produce</h1>
              <p class="welcome-copy">
                Search across all available products from local farmers.
              </p>
            </div>
          </div>

          <!-- Filters Section -->
          <div class="filters-section">
            <div class="section-header">
              <h2>Filters</h2>
              <button class="section-action" id="clearFiltersBtn">
                <i class="ph ph-x"></i>
                Clear All
              </button>
            </div>
            
            <!-- Categories -->
            <div class="categories-section">
              <h3 class="filter-label">Category</h3>
              <div class="categories-scroll" id="categoriesContainer" role="tablist" aria-label="Product categories">
                <!-- Categories rendered by JS -->
              </div>
            </div>

            <!-- Additional Filters -->
            <div class="advanced-filters">
              <div class="filter-group">
                <label class="form-label" for="farmerFilter">Farmer</label>
                <select class="form-select" id="farmerFilter">
                  <option value="">All Farmers</option>
                </select>
              </div>
              <div class="filter-group">
                <label class="form-label" for="locationFilter">Location</label>
                <select class="form-select" id="locationFilter">
                  <option value="">All Locations</option>
                </select>
              </div>
              <div class="filter-group">
                <label class="form-label" for="sortFilter">Sort By</label>
                <select class="form-select" id="sortFilter">
                  <option value="relevance">Relevance</option>
                  <option value="price-low">Price: Low to High</option>
                  <option value="price-high">Price: High to Low</option>
                  <option value="rating">Highest Rated</option>
                  <option value="name">Name</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Results Section -->
          <div class="results-section">
            <div class="results-header">
              <h2 id="resultsTitle">All Products</h2>
              <span class="results-count" id="resultsCount">0 products</span>
            </div>
            <div class="products-grid" id="searchResults" aria-live="polite" aria-busy="false">
              <!-- Search results rendered here -->
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Scripts -->
    <script src="../scripts/api.js"></script>
    <script src="../scripts/buyer-shared.js"></script>
    <script src="../scripts/buyer-search.js"></script>
  </body>
</html>
