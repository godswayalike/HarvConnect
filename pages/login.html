<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarvConnect - Welcome back</title>
    <link rel="stylesheet" href="../styles/login.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="auth-container">
        <header class="top-nav">
            <img src="../images/HarvConnect-logo.png" alt="HarvConnect Logo" class="brand-logo">
        </header>

        <main>
            <h1 class="page-title">Welcome back</h1>
            <p class="page-subtitle">Log in to access your account.</p>

            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="mensahjohn@gmail.com" required>
                    <span class="error-text" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="icon-btn toggle-password" aria-label="Toggle password visibility">
                            <i class="ph ph-eye-slash" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                    <span class="error-text" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <div class="input-wrapper select-wrapper">
                        <select id="role" name="role" required>
                            <option value="" disabled selected hidden>Enter Role</option>
                            <option value="Farmer">Farmer</option>
                            <option value="Buyer">Buyer</option>
                            <option value="Transport Provider">Transport Provider</option>
                        </select>
                        <i class="ph ph-caret-down select-icon"></i>
                    </div>
                    <span class="error-text" id="roleError"></span>
                </div>

                <div id="formMessage" class="form-message"></div>

                <button type="submit" class="submit-btn" id="submitBtn">Login</button>
            </form>

            <div class="footer-links">
                <p>New to Harvconnect? <a href="../index.html" class="highlight-link">Sign up</a></p>
                <a href="forgot-password.html" class="highlight-link forgot-password-link">Forgot Password?</a>
            </div>
        </main>
    </div>

    <script src="../scripts/login.js"></script>
</body>
</html>
