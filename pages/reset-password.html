<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarvConnect - Create new password</title>
    <link rel="stylesheet" href="../styles/reset-password.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="auth-container">
        <header class="top-nav">
            <img src="../images/HarvConnect-logo.png" alt="HarvConnect Logo" class="brand-logo">
        </header>

        <main>
            <h1 class="page-title">Create new password</h1>

            <form id="resetPasswordForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="newPassword">New password</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required>
                        <button type="button" class="icon-btn toggle-password" data-target="newPassword">
                            <i class="ph ph-eye-slash"></i>
                        </button>
                    </div>
                    <span class="error-text" id="newPasswordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
                        <button type="button" class="icon-btn toggle-password" data-target="confirmPassword">
                            <i class="ph ph-eye-slash"></i>
                        </button>
                    </div>
                    <span class="error-text" id="confirmPasswordError"></span>
                </div>

                <div id="formMessage" class="form-message"></div>

                <button type="submit" class="submit-btn" id="submitBtn">Continue</button>
            </form>
        </main>
    </div>
    <script src="../scripts/reset-password.js"></script>
</body>
</html>
