<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarvConnect - My Profile</title>
    <link rel="stylesheet" href="../styles/farmer-profile.css">
    <link rel="stylesheet" href="../styles/transporter-dashboard.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="app-layout">
        
        <aside class="sidebar">
            <div class="sidebar-brand">
                <img src="../images/HarvConnect-logo.png" alt="HarvConnect Logo">
            </div>
            
            <nav class="sidebar-menu">
                <a href="../pages/transporter-dashboard.html" class="sidebar-link"><i class="ph ph-house"></i> Home</a>
                <a href="../pages/transporter-job.html" class="sidebar-link"><i class="ph ph-briefcase"></i> Jobs</a>
                <a href="../pages/transporter-chat.html" class="sidebar-link"><i class="ph ph-chat-circle"></i> Chat</a>
                <a href="#" class="sidebar-link active"><i class="ph ph-user"></i> Profile</a>
            </nav>
        </aside>

        <main class="main-content">
            
            <header class="profile-header">
                <div class="avatar-container">
                    <div class="avatar-large">KJ</div>
                </div>
                <h1 class="user-name">Kofi John</h1>
                <span class="role-badge">Transport Provider</span>
                <div class="rating-container">
                    <i class="ph-fill ph-star rating-icon"></i>
                    <span class="rating-text">4.8 - 24 reviews</span>
                </div>
            </header>

            <div class="profile-content">
                <div class="menu-card">
                    <div class="menu-item" data-action="job-history">
                        <div class="menu-left">
                            <div class="icon-wrapper"><i class="ph ph-receipt"></i></div>
                            <span class="menu-text">Job History</span>
                        </div>
                        <i class="ph ph-caret-right chevron"></i>
                    </div>
                    
                    <div class="menu-item" data-action="notifications">
                        <div class="menu-left">
                            <div class="icon-wrapper"><i class="ph ph-bell"></i></div>
                            <span class="menu-text">Notifications</span>
                        </div>
                        <i class="ph ph-caret-right chevron"></i>
                    </div>
                    
                    <div class="menu-item" data-action="edit-profile">
                        <div class="menu-left">
                            <div class="icon-wrapper"><i class="ph ph-note-pencil"></i></div>
                            <span class="menu-text">Edit Profile</span>
                        </div>
                        <i class="ph ph-caret-right chevron"></i>
                    </div>
                    
                    <div class="menu-item" data-action="support">
                        <div class="menu-left">
                            <div class="icon-wrapper"><i class="ph ph-question"></i></div>
                            <span class="menu-text">Help & Support</span>
                        </div>
                        <i class="ph ph-caret-right chevron"></i>
                    </div>
                </div>

                <div class="menu-card logout-card" id="logoutBtn">
                    <div class="menu-item no-border">
                        <div class="menu-left">
                            <div class="icon-wrapper logout-icon"><i class="ph ph-sign-out"></i></div>
                            <span class="menu-text logout-text">Log Out</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mobile-bottom-spacer"></div>
        </main>

        <nav class="mobile-nav">
            <a href="transporter-dashboard.html" class="mobile-nav-link">
                <i class="ph ph-house"></i>
                <span>Home</span>
            </a>
            <a href="transporter-job.html" class="mobile-nav-link">
                <i class="ph ph-briefcase"></i>
                <span>Jobs</span>
            </a>
            <a href="transporter-chat.html" class="mobile-nav-link">
                <i class="ph ph-chat-circle"></i>
                <span>Chat</span>
            </a>
            <a href="transporter-profile.html" class="mobile-nav-link active">
                <i class="ph ph-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <div id="logoutModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-icon">
                <i class="ph ph-question"></i>
            </div>
            <h2 class="modal-title">Are you sure you want to log out?</h2>
            <div class="modal-buttons">
                <button class="btn-leave" id="confirmLogoutBtn">Yes, leave</button>
                <button class="btn-stay" id="cancelLogoutBtn">No, stay</button>
            </div>
        </div>
    </div>

    <script src="../scripts/transporter-profile.js"></script>
</body>
</html>
