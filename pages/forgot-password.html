<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HarvConnect - Forgot Password</title>
    <link rel="stylesheet" href="../styles/forgot-password.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div class="auth-container">
      <header class="top-nav">
        <button
          class="back-btn"
          aria-label="Go back"
          onclick="window.history.back()"
        >
          <i class="ph-bold ph-caret-left"></i>
        </button>
        <img
          src="../images/HarvConnect-logo.png"
          alt="HarvConnect Logo"
          class="brand-logo"
        />
      </header>

      <main>
        <h1 class="page-title">Enter your email</h1>
        <p class="page-subtitle">
          Verify your email address so we know it's you
        </p>

        <form id="forgotPasswordForm" class="auth-form" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="mensahjohn@gmail.com"
              required
            />
            <span class="error-text" id="emailError"></span>
          </div>

          <div id="formMessage" class="form-message"></div>

          <button type="submit" class="submit-btn" id="submitBtn">Next</button>
        </form>
      </main>
    </div>

    <script src="../scripts/api.js"></script>
    <script src="../scripts/forgot-password.js"></script>
  </body>
</html>
